name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Test
        run: uv run pytest -q

  eval-gate:
    # The harness gating itself: run the suite against the real MCP server,
    # then fail the build on any regression vs the committed baseline.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --extra dev
      - name: Run eval suite
        run: uv run trajeval run suites/timeseries/suite.yaml --runner scripted --out run.json
      - name: Gate against baseline
        run: uv run trajeval gate run.json --baseline baselines/scripted.json
